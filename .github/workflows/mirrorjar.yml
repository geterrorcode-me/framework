name: Generate Android Mirrors JAR

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Process Framework
        run: ./gradlew run --args="input/framework.jar output_mirrors"

      - name: Process Services
        run: ./gradlew run --args="input/services.jar output_mirrors"

      - name: Package to JAR
        run: |
          echo "📦 Membungkus kelas menjadi JAR..."
          # Masuk ke folder output dan bungkus isinya
          jar -cvf android_mirror_full.jar -C output_mirrors .
          echo "✅ JAR berhasil dibuat: android_mirror_full.jar"

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android-Mirror-Library
          path: android_mirror_full.jar
          retention-days: 7
          