name: Generate Android Mirrors

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Framework
        run: |
          mkdir -p input
          # Ganti URL ini dengan URL framework.jar Anda jika perlu
          curl -L "https://github.com/S-trace/android_frameworks_base_mirror/raw/master/framework.jar" -o input/framework.jar

      - name: Run Generator
        run: |
          chmod +x gradlew
          ./gradlew run --args="input/framework.jar output_mirrors"

      - name: Upload Result
        uses: actions/upload-artifact@v3
        with:
          name: Mirror-Result
          path: output_mirrors/
          
